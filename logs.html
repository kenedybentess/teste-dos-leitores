<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logs de Evidência</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>body{background:#f4f6f9;padding:20px} .header{background:linear-gradient(135deg,#0d6efd,#1e88e5);color:white;padding:25px;border-radius:15px;margin-bottom:20px}</style>
</head>
<body>
<div class="container-fluid">
<div class="header d-flex justify-content-between"><div><h2><i class="bi bi-file-text"></i> Logs de Evidência - Testes</h2><p class="mb-0">Histórico completo com hash de autenticidade</p></div><div><a href="testes.html" class="btn btn-light me-2">Novo Teste</a><a href="index.html" class="btn btn-outline-light">Dashboard</a></div></div>
<div class="card"><div class="card-header d-flex justify-content-between"><span>Total: <b id="total"></b> logs</span><div><button class="btn btn-sm btn-success" onclick="exportCSV()"><i class="bi bi-filetype-csv"></i> Exportar CSV</button><button class="btn btn-sm btn-danger ms-2" onclick="limpar()"><i class="bi bi-trash"></i> Limpar</button></div></div>
<div class="card-body"><div class="table-responsive"><table class="table table-hover"><thead><tr><th>LOG ID</th><th>Data Fim</th><th>Série</th><th>Operador</th><th>Produto</th><th>Duração</th><th>Resultado</th><th>Hash</th><th>Ação</th></tr></thead><tbody id="tbody"></tbody></table></div></div></div>
<div id="detalhe" class="card mt-4" style="display:none;"><div class="card-header">Detalhe do Log</div><div class="card-body"><pre id="preDetalhe" style="font-size:12px;"></pre></div></div>
</div>
<script>
function carregar(){let logs=JSON.parse(localStorage.getItem('logs_evidencia')||'[]');document.getElementById('total').innerText=logs.length;let tbody=document.getElementById('tbody');tbody.innerHTML=logs.length===0?'<tr><td colspan=9 class="text-center">Nenhum log ainda</td></tr>':logs.map(l=>`<tr><td><small>${l.log_id}</small></td><td>${l.fim_br}</td><td><b>${l.serie}</b></td><td>${l.operador}</td><td>${l.produto}</td><td>${l.duracao_segundos}s</td><td><span class="badge ${l.resultado==='APROVADO'?'bg-success':'bg-danger'}">${l.resultado}</span></td><td><small style="font-family:monospace;">${l.hash.slice(0,8)}...</small></td><td><button class="btn btn-sm btn-primary" onclick="ver('${l.log_id}')"><i class="bi bi-eye"></i></button></td></tr>`).join('');}
function ver(id){let logs=JSON.parse(localStorage.getItem('logs_evidencia'));let l=logs.find(x=>x.log_id===id);document.getElementById('detalhe').style.display='block';document.getElementById('preDetalhe').innerText=JSON.stringify(l,null,2);window.scrollTo(0,document.body.scrollHeight);}
function exportCSV(){let logs=JSON.parse(localStorage.getItem('logs_evidencia')||'[]');let csv='LOG_ID;DATA_INICIO;DATA_FIM;SERIE;OPERADOR;PRODUTO;RESULTADO;DURACAO;HASH\n'+logs.map(l=>`${l.log_id};${l.inicio_br};${l.fim_br};${l.serie};${l.operador};${l.produto};${l.resultado};${l.duracao_segundos};${l.hash}`).join('\n');let blob=new Blob([csv],{type:'text/csv'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='logs_evidencia_'+new Date().toISOString().slice(0,10)+'.csv';a.click();}
function limpar(){if(confirm('Apagar todos os logs de evidência?')){localStorage.setItem('logs_evidencia',JSON.stringify([]));carregar();}}
document.addEventListener('DOMContentLoaded',carregar);
</script>
</body>
</html>
