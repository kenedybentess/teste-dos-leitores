<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - Leitores PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Tahoma,sans-serif}
        body{background:#f4f6f9}
        .sidebar{width:250px;background:#212529;color:white;height:100vh;position:fixed;left:0;top:0}
        .sidebar h3{padding:20px;text-align:center;background:#0d6efd}
        .sidebar ul{list-style:none;padding:0}
        .sidebar li{padding:15px 20px;cursor:pointer;transition:.3s}
        .sidebar li:hover,.sidebar li.active{background:#0d6efd}
        .sidebar a{color:white;text-decoration:none;display:block}
        .topbar{margin-left:250px;height:60px;background:white;display:flex;justify-content:space-between;align-items:center;padding:0 25px;box-shadow:0 2px 5px rgba(0,0,0,.1)}
        .content{margin-left:250px;padding:25px;height:calc(100vh - 60px);overflow:auto}
    </style>
</head>
<body>
    <div class="sidebar">
        <h3><i class="bi bi-upc-scan"></i> Leitores PRO</h3>
        <ul>
            <li><a href="index.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li class="active"><a href="produtos.html"><i class="bi bi-box-seam"></i> Produtos</a></li>
            <li><a href="operadores.html"><i class="bi bi-people"></i> Operadores</a></li>
            <li><a href="testes.html"><i class="bi bi-clipboard-check"></i> Testes</a></li>
            <li><a href="historico.html"><i class="bi bi-clock-history"></i> Histórico</a></li>
        </ul>
    </div>
    <div class="topbar">
        <h4>Cadastro de Produtos</h4>
        <div>Administrador</div>
    </div>
    <div class="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-box-seam"></i> Produtos</h2>
            <button class="btn btn-primary" onclick="abrirModalProduto()">
                <i class="bi bi-plus-circle"></i> Novo Produto
            </button>
        </div>
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead><tr><th>Código</th><th>Nome</th><th>Modelo</th><th>Tipo</th><th>Ações</th></tr></thead>
                        <tbody id="tabelaProdutos"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="modalProduto" tabindex="-1">
        <div class="modal-dialog"><div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="tituloModalProduto">Novo Produto</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="produtoId">
                <div class="mb-3"><label>Código *</label><input id="produtoCodigo" class="form-control"></div>
                <div class="mb-3"><label>Nome *</label><input id="produtoNome" class="form-control"></div>
                <div class="mb-3"><label>Modelo *</label><input id="produtoModelo" class="form-control"></div>
                <div class="mb-3"><label>Tipo</label>
                    <select id="produtoTipo" class="form-select">
                        <option value="BR520">BR520</option>
                        <option value="EL250">EL250</option>
                        <option value="FLASH">FLASH</option>
                        <option value="EL8600">EL8600</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="salvarProduto()">Salvar</button>
            </div>
        </div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        if(!localStorage.getItem('produtos')) localStorage.setItem('produtos', JSON.stringify([]));
        let modalProduto;
        document.addEventListener('DOMContentLoaded', () => {
            modalProduto = new bootstrap.Modal(document.getElementById('modalProduto'));
            carregarProdutos();
        });
        function carregarProdutos(){
            const produtos = JSON.parse(localStorage.getItem('produtos'));
            const tbody = document.getElementById('tabelaProdutos');
            tbody.innerHTML = produtos.length === 0 ? '<tr><td colspan="5" class="text-center text-muted">Nenhum produto</td></tr>' : 
                produtos.map(p => `
                    <tr>
                        <td><strong>${p.codigo}</strong></td><td>${p.nome}</td><td>${p.modelo}</td>
                        <td><span class="badge bg-secondary">${p.tipo}</span></td>
                        <td>
                            <button class="btn btn-sm btn-warning me-1" onclick="editarProduto('${p.id}')"><i class="bi bi-pencil"></i></button>
                            <button class="btn btn-sm btn-danger" onclick="excluirProduto('${p.id}')"><i class="bi bi-trash"></i></button>
                        </td>
                    </tr>`).join('');
        }
        function abrirModalProduto(){
            document.getElementById('tituloModalProduto').innerText = 'Novo Produto';
            document.getElementById('produtoId').value = '';
            document.getElementById('produtoCodigo').value = '';
            document.getElementById('produtoNome').value = '';
            document.getElementById('produtoModelo').value = '';
            modalProduto.show();
        }
        function salvarProduto(){
            const id = document.getElementById('produtoId').value;
            const codigo = document.getElementById('produtoCodigo').value.trim();
            const nome = document.getElementById('produtoNome').value.trim();
            const modelo = document.getElementById('produtoModelo').value.trim();
            const tipo = document.getElementById('produtoTipo').value;
            if(!codigo||!nome||!modelo) return alert('Preencha todos os campos');
            let produtos = JSON.parse(localStorage.getItem('produtos'));
            if(produtos.find(p => p.codigo === codigo && p.id!== id)) return alert('Código já existe');
            if(id) produtos = produtos.map(p => p.id === id? {id,codigo,nome,modelo,tipo} : p);
            else produtos.push({id:Date.now().toString(),codigo,nome,modelo,tipo});
            localStorage.setItem('produtos', JSON.stringify(produtos));
            modalProduto.hide(); carregarProdutos();
        }
        function editarProduto(id){
            const p = JSON.parse(localStorage.getItem('produtos')).find(p => p.id === id);
            document.getElementById('tituloModalProduto').innerText = 'Editar Produto';
            document.getElementById('produtoId').value = p.id;
            document.getElementById('produtoCodigo').value = p.codigo;
            document.getElementById('produtoNome').value = p.nome;
            document.getElementById('produtoModelo').value = p.modelo;
            document.getElementById('produtoTipo').value = p.tipo;
            modalProduto.show();
        }
        function excluirProduto(id){
            if(!confirm('Excluir?')) return;
            let produtos = JSON.parse(localStorage.getItem('produtos')).filter(p => p.id!== id);
            localStorage.setItem('produtos', JSON.stringify(produtos));
            carregarProdutos();
        }
    </script>
</body>
</html>
