<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operadores - Leitores PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Tahoma,sans-serif}
        body{background:#f4f6f9}
        .sidebar{width:250px;background:#212529;color:white;height:100vh;position:fixed;left:0;top:0}
        .sidebar h3{padding:20px;text-align:center;background:#0d6efd}
        .sidebar ul{list-style:none;padding:0}
        .sidebar li{padding:15px 20px;cursor:pointer;transition:.3s}
        .sidebar li:hover,.sidebar li.active{background:#0d6efd}
        .sidebar a{color:white;text-decoration:none;display:block}
        .topbar{margin-left:250px;height:60px;background:white;display:flex;justify-content:space-between;align-items:center;padding:0 25px;box-shadow:0 2px 5px rgba(0,0,0,.1)}
        .content{margin-left:250px;padding:25px;height:calc(100vh - 60px);overflow:auto}
    </style>
</head>
<body>
    <div class="sidebar">
        <h3><i class="bi bi-upc-scan"></i> Leitores PRO</h3>
        <ul>
            <li><a href="index.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li><a href="produtos.html"><i class="bi bi-box-seam"></i> Produtos</a></li>
            <li class="active"><a href="operadores.html"><i class="bi bi-people"></i> Operadores</a></li>
            <li><a href="testes.html"><i class="bi bi-clipboard-check"></i> Testes</a></li>
            <li><a href="historico.html"><i class="bi bi-clock-history"></i> Histórico</a></li>
        </ul>
    </div>
    <div class="topbar">
        <h4>Cadastro de Operadores</h4>
        <div>Administrador</div>
    </div>
    <div class="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-people"></i> Operadores</h2>
            <button class="btn btn-primary" onclick="abrirModalOperador()">
                <i class="bi bi-plus-circle"></i> Novo Operador
            </button>
        </div>
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead><tr><th>Matrícula</th><th>Nome</th><th>Turno</th><th>Status</th><th>Ações</th></tr></thead>
                        <tbody id="tabelaOperadores"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalOperador" tabindex="-1">
        <div class="modal-dialog"><div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="tituloModalOperador">Novo Operador</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="operadorId">
                <div class="mb-3"><label>Matrícula *</label><input id="operadorMatricula" class="form-control"></div>
                <div class="mb-3"><label>Nome *</label><input id="operadorNome" class="form-control"></div>
                <div class="mb-3"><label>Turno</label>
                    <select id="operadorTurno" class="form-select">
                        <option value="Manhã">Manhã</option>
                        <option value="Tarde">Tarde</option>
                        <option value="Noite">Noite</option>
                    </select>
                </div>
                <div class="mb-3"><label>Status</label>
                    <select id="operadorStatus" class="form-select">
                        <option value="Ativo">Ativo</option>
                        <option value="Inativo">Inativo</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="salvarOperador()">Salvar</button>
            </div>
        </div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        if(!localStorage.getItem('operadores')) localStorage.setItem('operadores', JSON.stringify([]));
        let modalOperador;
        document.addEventListener('DOMContentLoaded', () => {
            modalOperador = new bootstrap.Modal(document.getElementById('modalOperador'));
            carregarOperadores();
        });
        function carregarOperadores(){
            const ops = JSON.parse(localStorage.getItem('operadores'));
            const tbody = document.getElementById('tabelaOperadores');
            tbody.innerHTML = ops.length === 0 ? '<tr><td colspan="5" class="text-center text-muted">Nenhum operador</td></tr>' : 
                ops.map(o => `
                    <tr>
                        <td><strong>${o.matricula}</strong></td><td>${o.nome}</td><td>${o.turno}</td>
                        <td><span class="badge ${o.status==='Ativo'?'bg-success':'bg-secondary'}">${o.status}</span></td>
                        <td>
                            <button class="btn btn-sm btn-warning me-1" onclick="editarOperador('${o.id}')"><i class="bi bi-pencil"></i></button>
                            <button class="btn btn-sm btn-danger" onclick="excluirOperador('${o.id}')"><i class="bi bi-trash"></i></button>
                        </td>
                    </tr>`).join('');
        }
        function abrirModalOperador(){
            document.getElementById('tituloModalOperador').innerText = 'Novo Operador';
            document.getElementById('operadorId').value = '';
            document.getElementById('operadorMatricula').value = '';
            document.getElementById('operadorNome').value = '';
            modalOperador.show();
        }
        function salvarOperador(){
            const id = document.getElementById('operadorId').value;
            const matricula = document.getElementById('operadorMatricula').value.trim();
            const nome = document.getElementById('operadorNome').value.trim();
            const turno = document.getElementById('operadorTurno').value;
            const status = document.getElementById('operadorStatus').value;
            if(!matricula||!nome) return alert('Preencha os campos');
            let ops = JSON.parse(localStorage.getItem('operadores'));
            if(ops.find(o => o.matricula === matricula && o.id!== id)) return alert('Matrícula já existe');
            if(id) ops = ops.map(o => o.id === id? {id,matricula,nome,turno,status} : o);
            else ops.push({id:Date.now().toString(),matricula,nome,turno,status});
            localStorage.setItem('operadores', JSON.stringify(ops));
            modalOperador.hide(); carregarOperadores();
        }
        function editarOperador(id){
            const o = JSON.parse(localStorage.getItem('operadores')).find(o => o.id === id);
            document.getElementById('tituloModalOperador').innerText = 'Editar Operador';
            document.getElementById('operadorId').value = o.id;
            document.getElementById('operadorMatricula').value = o.matricula;
            document.getElementById('operadorNome').value = o.nome;
            document.getElementById('operadorTurno').value = o.turno;
            document.getElementById('operadorStatus').value = o.status;
            modalOperador.show();
        }
        function excluirOperador(id){
            if(!confirm('Excluir?')) return;
            let ops = JSON.parse(localStorage.getItem('operadores')).filter(o => o.id!== id);
            localStorage.setItem('operadores', JSON.stringify(ops));
            carregarOperadores();
        }
    </script>
</body>
</html>
