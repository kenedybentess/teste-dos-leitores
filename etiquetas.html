<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etiquetas - Leitores PRO</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{background:#f4f6f9;padding:20px}
.header-etq{background:linear-gradient(135deg,#0d6efd,#1e88e5);color:white;padding:25px;border-radius:15px;margin-bottom:30px}
.etiqueta-preview{
    width:378px;
    height:340px;
    border:2px solid #000;
    background:white;
    margin:0 auto;
    padding:0;
    font-size:7px;
    line-height:1.1;
}
.etq-table{width:100%;height:100%;border-collapse:collapse;table-layout:fixed}
.etq-table td{border:1px solid #000;padding:2px 3px;vertical-align:top;word-wrap:break-word}
.etq-selo{
    width:62px;height:62px;border:2px solid #000;border-radius:50%;margin:3px auto;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-size:5px;font-weight:bold;text-align:center;line-height:1.05;padding:2px
}
.etq-selo-num{font-size:16px;line-height:1;margin:1px 0}
.etq-selo-dots{font-size:4px;letter-spacing:0.5px}
.etq-selo-status{font-size:5px;margin-top:1px}
.etq-barcode{text-align:center;padding:1px}
.etq-barcode svg{max-width:100%;height:auto}
.etq-logo{font-weight:bold;font-size:11px;padding:4px 6px;letter-spacing:0.5px}
.etq-data{font-size:7px;text-align:center;padding:3px 5px}
.etq-label{font-size:5.5px;font-weight:bold;text-transform:uppercase;display:block;margin-bottom:1px;letter-spacing:0.2px}
.etq-value{font-size:7.5px;font-weight:normal}
.etq-desc{font-size:6.5px;line-height:1.1}
.etq-manaus{font-size:5.5px;text-align:center;padding:3px;line-height:1.2}
@media print{
    body{background:white;padding:0;margin:0}
  .no-print{display:none!important}
.etiqueta-preview{margin:0;border:none;page-break-inside:avoid}
   @page{size:100mm 90mm;margin:0}
}
.zpl-box{background:#1e1e1e;color:#d4d4d4;padding:15px;border-radius:8px;font-family:'Courier New',monospace;font-size:11px;overflow-x:auto;white-space:pre;max-height:400px;overflow-y:auto}
</style>
</head>
<body>
<div class="container-fluid no-print">
    <div class="header-etq">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h2><i class="bi bi-printer"></i> Gerador de Etiquetas EL250</h2>
                <p class="mb-0">Padrão Elgin - 100mm x 90mm</p>
            </div>
            <a href="index.html" class="btn btn-light"><i class="bi bi-arrow-left"></i> Dashboard</a>
        </div>
    </div>

    <div class="row">
        <div class="col-md-5">
            <div class="card mb-3">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="bi bi-list-check"></i> Dados da Etiqueta</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-12 mb-2">
                            <label class="small fw-bold">CNPJ (Fixo)</label>
                            <input id="cnpj" class="form-control form-control-sm" value="14.200.166/0005-90" readonly>
                        </div>
                        <div class="col-12 mb-2">
                            <label class="small fw-bold">Nº Inspetor Qualidade *</label>
                            <input id="numInspetor" class="form-control form-control-sm" value="8" maxlength="2" placeholder="Ex: 8">
                        </div>
                        <div class="col-12 mb-2">
                            <label class="small fw-bold">Status Qualidade</label>
                            <select id="statusQualidade" class="form-select form-select-sm">
                                <option value="APROVADO">APROVADO</option>
                                <option value="Reprovado">Reprovado</option>
                            </select>
                        </div>
                        <div class="col-12 mb-2">
                            <label class="small fw-bold">Código do Produto Elgin</label>
                            <input id="codProduto" class="form-control form-control-sm" value="46ELP250BC000">
                        </div>
                        <div class="col-12 mb-2">
                            <label class="small fw-bold">Descrição</label>
                            <input id="descProduto" class="form-control form-control-sm" value="LEITOR COD BARRAS 1D 2D ELGIN BEMA EL250">
                        </div>
                        <div class="col-6 mb-2">
                            <label class="small fw-bold">Vol. (Fixo)</label>
                            <input id="vol" class="form-control form-control-sm" value="01" readonly>
                        </div>
                        <div class="col-6 mb-2">
                            <label class="small fw-bold">QTD. (Fixo)</label>
                            <input id="qtd" class="form-control form-control-sm" value="01" readonly>
                        </div>
                        <div class="col-12 mb-2">
                            <label class="small fw-bold">Código Elgin</label>
                            <input id="codElgin" class="form-control form-control-sm" value="46EL250USC01">
                        </div>
                        <div class="col-12 mb-2">
                            <label class="small fw-bold">Código EAN 13</label>
                            <input id="ean13" class="form-control form-control-sm" value="3424">
                        </div>
                        <div class="col-12 mb-2">
                            <label class="small fw-bold">Número de Série</label>
                            <input id="serie" class="form-control form-control-sm" value="26050001">
                        </div>
                        <div class="col-12 mb-2">
                            <label class="small fw-bold">Código Adicional</label>
                            <input id="codAdicional" class="form-control form-control-sm" value="125526000001210825">
                        </div>
                        <div class="col-12 mb-2">
                            <label class="small fw-bold">Data</label>
                            <input id="data" class="form-control form-control-sm" value="21/08/2025">
                        </div>
                    </div>
                    <hr>
                    <button class="btn btn-primary w-100 mb-2" onclick="gerarEtiqueta()">
                        <i class="bi bi-arrow-clockwise"></i> Atualizar Preview
                    </button>
                    <button class="btn btn-success w-100 mb-2" onclick="window.print()">
                        <i class="bi bi-printer-fill"></i> Imprimir Etiqueta
                    </button>
                    <button class="btn btn-info w-100" onclick="gerarZPL()">
                        <i class="bi bi-file-code"></i> Gerar Código ZPL
                    </button>
                    <button class="btn btn-warning w-100 mt-2" onclick="carregarDoTeste()">
                        <i class="bi bi-download"></i> Carregar do Último Teste OK
                    </button>
                </div>
            </div>
        </div>
        
        <div class="col-md-7">
            <div class="card mb-3">
                <div class="card-header">
                    <h5 class="mb-0"><i class="bi bi-eye"></i> Preview da Etiqueta</h5>
                </div>
                <div class="card-body text-center" style="background:#e9ecef">
                    <div class="etiqueta-preview" id="etiquetaPreview"></div>
                    <div class="mt-3">
                        <small class="text-muted">
                            <i class="bi bi-rulers"></i> Tamanho: 100mm x 90mm | 
                            <i class="bi bi-printer"></i> Zebra ZT411
                        </small>
                    </div>
                </div>
            </div>
            
            <div class="card" id="cardZPL" style="display:none">
                <div class="card-header bg-dark text-white">
                    <h6 class="mb-0"><i class="bi bi-code-slash"></i> Código ZPL para Zebra</h6>
                </div>
                <div class="card-body">
                    <div class="zpl-box" id="codigoZPL"></div>
                    <button class="btn btn-sm btn-secondary mt-2" onclick="copiarZPL()">
                        <i class="bi bi-clipboard"></i> Copiar ZPL
                    </button>
                    <button class="btn btn-sm btn-secondary mt-2" onclick="baixarZPL()">
                        <i class="bi bi-download"></i> Baixar.ZPL
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    // Verifica se veio do teste
    const urlParams = new URLSearchParams(window.location.search);
    const autoLoad = urlParams.get('auto');

    if(autoLoad === 'true'){
        // Carrega dados do último teste OK
        const ultimoTeste = JSON.parse(sessionStorage.getItem('ultimoTesteOK') || '{}');
        if(ultimoTeste.serie){
            document.getElementById('serie').value = ultimoTeste.serie;
            document.getElementById('codProduto').value = ultimoTeste.produtoCodigo;
            document.getElementById('data').value = new Date(ultimoTeste.data).toLocaleDateString('pt-BR');

            const produtos = JSON.parse(localStorage.getItem('produtos') || '[]');
            const prod = produtos.find(p => p.codigo === ultimoTeste.produtoCodigo);
            if(prod){
                document.getElementById('descProduto').value = prod.nome;
                document.getElementById('codElgin').value = prod.modelo || '46EL250USC01';
            }

            gerarEtiqueta();

            // Pergunta número do inspetor
            setTimeout(() => {
                const num = prompt('Número do Inspetor de Qualidade:', '8');
                if(num) {
                    document.getElementById('numInspetor').value = num;
                    gerarEtiqueta();
                }
            }, 500);
        }
    } else {
        gerarEtiqueta();
    }

    document.querySelectorAll('input:not([readonly]), select').forEach(input => {
        input.addEventListener('input', () => {
            clearTimeout(window.previewTimeout);
            window.previewTimeout = setTimeout(gerarEtiqueta, 400);
        });
    });
});

function gerarEtiqueta(){
    const cnpj = document.getElementById('cnpj').value;
    const numInspetor = document.getElementById('numInspetor').value || '8';
    const statusQualidade = document.getElementById('statusQualidade').value;
    const codProduto = document.getElementById('codProduto').value;
    const descProduto = document.getElementById('descProduto').value;
    const vol = document.getElementById('vol').value;
    const qtd = document.getElementById('qtd').value;
    const codElgin = document.getElementById('codElgin').value;
    const ean13 = document.getElementById('ean13').value;
    const serie = document.getElementById('serie').value;
    const codAdicional = document.getElementById('codAdicional').value;
    const data = document.getElementById('data').value;
    
    const html = `
        <table class="etq-table">
            <tr>
                <td style="width:80px" class="etq-logo">elgin</td>
                <td colspan="2" style="text-align:center;font-size:6.5px;padding:3px">
                    CNPJ: ${cnpj}
                </td>
            </tr>
            <tr>
                <td colspan="2" style="padding:2px">
                    <div class="etq-desc">${descProduto}</div>
                    <span class="etq-label">Código do Produto Elgin</span>
                    <span class="etq-value">${codProduto}</span><br>
                    <span class="etq-label">QTD.:01</span>
                    <span class="etq-value">${qtd}</span>
                    <span style="margin-left:15px" class="etq-label">VOL:01</span>
                    <span class="etq-value">${vol}</span>
                </td>
                <td rowspan="2" style="width:75px;text-align:center;vertical-align:top;padding-top:3px">
                    <div class="etq-selo">
                        <div>CONTROLE DE</div>
                        <div>QUALIDADE</div>
                        <div class="etq-selo-num">${numInspetor}</div>
                        <div class="etq-selo-dots">•••••••••</div>
                        <div class="etq-selo-status">${statusQualidade}</div>
                    </div>
                </td>
            </tr>
            <tr>
                <td style="padding:2px">
                    <span class="etq-label">Código Elgin</span>
                    <span class="etq-value">${codElgin}</span>
                </td>
                <td style="padding:2px">
                    <span class="etq-label">Código EAN 13</span>
                    <span class="etq-value">${ean13}</span>
                </td>
            </tr>
            <tr>
                <td colspan="2" class="etq-barcode" style="padding:2px">
                    <svg id="barcodeEAN"></svg>
                </td>
                <td rowspan="2" style="padding:2px;vertical-align:bottom">
                    <div style="font-size:6px;text-align:center;margin-bottom:2px">${codAdicional}</div>
                </td>
            </tr>
            <tr>
                <td colspan="2" style="padding:2px">
                    <span class="etq-label">Número de Série</span>
                    <div class="etq-barcode" style="padding:1px">
                        <svg id="barcodeSerie"></svg>
                        <div style="font-size:5.5px;margin-top:1px">${serie}</div>
                    </div>
                </td>
            </tr>
            <tr>
                <td class="etq-manaus" style="border-top:2px solid #000">
                    PRODUZIDO NO<br>
                    POLO INDUSTRIAL<br>
                    DE MANAUS<br>
                    <div style="font-size:5px;margin-top:2px">CONHEÇA A AMAZÔNIA</div>
                </td>
                <td colspan="2" class="etq-data" style="border-top:2px solid #000">
                    DATA ${data}
                </td>
            </tr>
        </table>
    `;
    
    document.getElementById('etiquetaPreview').innerHTML = html;
    
    setTimeout(() => {
        try {
            JsBarcode("#barcodeEAN", ean13, {
                format: "CODE128",
                width: 0.75,
                height: 22,
                displayValue: false,
                margin: 0
            });
            JsBarcode("#barcodeSerie", serie, {
                format: "CODE128",
                width: 0.75,
                height: 22,
                displayValue: false,
                margin: 0
            });
        } catch(e) {
            console.error('Erro barcode:', e);
        }
    }, 100);
}

function gerarZPL(){
    const numInspetor = document.getElementById('numInspetor').value || '8';
    const statusQualidade = document.getElementById('statusQualidade').value;
    const codProduto = document.getElementById('codProduto').value;
    const descProduto = document.getElementById('descProduto').value;
    const vol = document.getElementById('vol').value;
    const qtd = document.getElementById('qtd').value;
    const codElgin = document.getElementById('codElgin').value;
    const ean13 = document.getElementById('ean13').value;
    const serie = document.getElementById('serie').value;
    const codAdicional = document.getElementById('codAdicional').value;
    const data = document.getElementById('data').value;
    
    const zpl = `^XA
^PW800
^LL720
^FO20,15^A0N,22,22^FDelgin^FS
^FO200,15^A0N,14,14^FDCNPJ: 14.200.166/0005-90^FS
^FO20,50^A0N,12,12^FD${descProduto}^FS
^FO20,70^A0N,10,10^FDCODIGO DO PRODUTO ELGIN^FS
^FO20,85^A0N,16,16^FD${codProduto}^FS
^FO20,105^A0N,10,10^FDQTD.:
