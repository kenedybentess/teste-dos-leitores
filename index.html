<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Teste Leitores PRO</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Tahoma,sans-serif}
body{background:#f4f6f9;overflow:hidden}
#loginPage{width:100%;height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#0d6efd,#1e88e5)}
.login-card{width:420px;background:white;padding:40px;border-radius:15px;box-shadow:0px 10px 30px rgba(0,0,0,.2)}
.login-card h2{text-align:center;margin-bottom:30px;font-weight:bold;color:#0d6efd}
#app{display:none;height:100vh}
.sidebar{width:250px;background:#212529;color:white;height:100vh;position:fixed;left:0;top:0;overflow-y:auto}
.sidebar h3{padding:20px;text-align:center;background:#0d6efd;position:sticky;top:0}
.sidebar ul{list-style:none;padding:0}
.sidebar li{padding:0}
.sidebar a{color:white;text-decoration:none;display:block;padding:15px 20px;transition:.3s}
.sidebar a:hover{background:#0d6efd;color:white}
.sidebar a.active{background:#0d6efd}
.sidebar li.logout{padding:15px 20px;cursor:pointer;transition:.3s}
.sidebar li.logout:hover{background:#dc3545}
.topbar{margin-left:250px;height:60px;background:white;display:flex;justify-content:space-between;align-items:center;padding:0 25px;box-shadow:0 2px 5px rgba(0,0,0,.1)}
.content{margin-left:250px;padding:25px;height:calc(100vh - 60px);overflow:auto}
.card-dashboard{border:none;border-radius:15px;padding:20px;box-shadow:0 5px 15px rgba(0,0,0,.08);transition:.3s}
.card-dashboard:hover{transform:translateY(-5px)}
.big-number{font-size:35px;font-weight:bold}
@media (max-width: 768px){.sidebar{width:100%;height:auto;position:relative}.topbar,.content{margin-left:0}#app{overflow:auto}}
</style>
</head>
<body>
<!-- LOGIN -->
<div id="loginPage">
<div class="login-card">
<h2><i class="bi bi-cpu"></i> Sistema Teste Leitores</h2>
<div class="mb-3"><label>Usuário</label><input id="user" class="form-control" value="admin"></div>
<div class="mb-3"><label>Senha</label><input id="pass" type="password" class="form-control" value="123"></div>
<button class="btn btn-primary w-100" onclick="login()">Entrar</button>
</div>
</div>

<!-- SISTEMA -->
<div id="app">
<div class="sidebar">
<h3><i class="bi bi-upc-scan"></i> Leitores PRO</h3>
<ul>
<li><a href="index.html" class="active"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
<li><a href="produtos.html"><i class="bi bi-box-seam"></i> Produtos</a></li>
<li><a href="operadores.html"><i class="bi bi-people"></i> Operadores</a></li>
<li><a href="testes.html"><i class="bi bi-clipboard-check"></i> Testes</a></li>
<li><a href="historico.html"><i class="bi bi-clock-history"></i> Histórico</a></li>
<li><a href="etiquetas.html"><i class="bi bi-printer"></i> Etiquetas</a></li>
<li><a href="relatorios.html"><i class="bi bi-file-earmark-bar-graph"></i> Relatórios</a></li>
<li class="logout" onclick="logout()"><i class="bi bi-box-arrow-left"></i> Sair</li>
</ul>
</div>
<div class="topbar">
<h4>Dashboard</h4>
<div id="nomeUsuario">Administrador</div>
</div>
<div class="content">
<div class="row">
<div class="col-md-3">
<div class="card-dashboard">
<h6>Total Testes</h6>
<div class="big-number" id="totalTestes">0</div>
</div>
<div class="col-md-3">
<div class="card-dashboard">
<h6>Aprovados</h6>
<div class="big-number text-success" id="totalAprovados">0</div>
</div>
</div>
<div class="col-md-3">
<div class="card-dashboard">
<h6>Reprovados</h6>
<div class="big-number text-danger" id="totalReprovados">0</div>
</div>
<div class="col-md-3">
<div class="card-dashboard">
<h6>Produtos</h6>
<div class="big-number" id="totalProdutos">0</div>
</div>
</div>
</div>
<hr>
<h4>Últimos Testes</h4>
<table class="table table-bordered">
<thead><tr><th>Série</th><th>Produto</th><th>Modelo</th><th>Operador</th><th>Resultado</th></tr></thead>
<tbody id="ultimosTestes"></tbody>
</table>
</div>
</div>

<script>
// === LOGIN ===
function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;
if(u=="admin" && p=="123"){
sessionStorage.setItem("logged","true");
document.getElementById("loginPage").style.display="none";
document.getElementById("app").style.display="block";
atualizarDashboard();
}else{alert("Usuário ou senha inválidos")}
}
function logout(){sessionStorage.removeItem("logged");location.reload()}
if(sessionStorage.getItem("logged")==="true"){
document.getElementById("loginPage").style.display="none";
document.getElementById("app").style.display="block";
}

// === INICIALIZAÇÃO ===
if(!localStorage.getItem('produtos')) localStorage.setItem('produtos',JSON.stringify([]));
if(!localStorage.getItem('operadores')) localStorage.setItem('operadores',JSON.stringify([{id:'1',matricula:'ADMIN',nome:'Administrador',setor:'Administrativo',turno:'Administrativo',status:'Ativo'}]));
if(!localStorage.getItem('testes')) localStorage.setItem('testes',JSON.stringify([]));

document.addEventListener('DOMContentLoaded',function(){
if(sessionStorage.getItem("logged")==="true") atualizarDashboard();
});

// === DASHBOARD ===
function atualizarDashboard(){
const testes=JSON.parse(localStorage.getItem('testes'));
const produtos=JSON.parse(localStorage.getItem('produtos'));
document.getElementById('totalTestes').innerText=testes.length;
document.getElementById('totalAprovados').innerText=testes.filter(t=>t.resultado==='Aprovado').length;
document.getElementById('totalReprovados').innerText=testes.filter(t=>t.resultado==='Reprovado').length;
document.getElementById('totalProdutos').innerText=produtos.length;
const tbody=document.getElementById('ultimosTestes');
const ultimos=testes.slice(0,5);
tbody.innerHTML=ultimos.length===0?'<tr><td colspan="5" class="text-center text-muted">Nenhum teste</td></tr>':
ultimos.map(t=>`<tr><td><strong>${t.serie}</strong></td><td>${t.produtoCodigo}</td><td>${t.modelo}</td><td>${t.operador}</td><td><span class="badge ${t.resultado==='Aprovado'?'bg-success':'bg-danger'}">${t.resultado}</span></td></tr>`).join('');
}
</script>
</body>
</html>
