<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testes - Leitores PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Tahoma,sans-serif}
        body{background:#f4f6f9;padding:20px}
        .header-teste{background:linear-gradient(135deg,#0d6efd,#1e88e5);color:white;padding:25px;border-radius:15px;margin-bottom:30px;box-shadow:0 5px 15px rgba(0,0,0,.1)}
        .card-teste{border:none;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,.08);transition:.3s;cursor:pointer;height:100%}
        .card-teste:hover{transform:translateY(-5px);box-shadow:0 8px 25px rgba(0,0,0,.15)}
        .card-teste.active{border:3px solid #0d6efd;background:#f0f7ff}
        .badge-tipo{font-size:14px;padding:8px 15px}
        .tabela-teste{background:white;border-radius:10px;overflow:hidden;box-shadow:0 5px 15px rgba(0,0,0,.08)}
        .tabela-teste thead{background:#0d6efd;color:white}
        .tabela-teste th{padding:15px;text-align:center;font-weight:600}
        .tabela-teste td{padding:12px;vertical-align:middle;text-align:center}
        .tabela-teste input{border:1px solid #dee2e6;text-align:center}
        .tabela-teste input:focus{border-color:#0d6efd;box-shadow:0 0 0 .2rem rgba(13,110,253,.25)}
        .btn-ok{background:#198754;color:white}
        .btn-nok{background:#dc3545;color:white}
        .linha-ok{background:#d1e7dd!important}
        .linha-nok{background:#f8d7da!important}
        #reader{border:3px solid #0d6efd;border-radius:10px}
        .scan-ativo{background:#fff3cd;border:2px solid #ffc107!important}
    </style>
</head>
<body>
    <div class="container-fluid">
        <!-- HEADER -->
        <div class="header-teste">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h2><i class="bi bi-upc-scan"></i> Módulos de Teste - EL250</h2>
                    <p class="mb-0">Bipe o código de barras para validar</p>
                </div>
                <button class="btn btn-light" onclick="window.location.href='index.html'">
                    <i class="bi bi-arrow-left"></i> Dashboard
                </button>
            </div>
        </div>

        <!-- SELEÇÃO DE PRODUTO -->
        <div class="card mb-4">
            <div class="card-body">
                <div class="row align-items-end">
                    <div class="col-md-4">
                        <label>Produto em Teste *</label>
                        <select id="produtoSelecionado" class="form-select form-select-lg" onchange="carregarProdutoInfo()">
                            <option value="">Selecione...</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label>Operador *</label>
                        <select id="operadorSelecionado" class="form-select form-select-lg"></select>
                    </div>
                    <div class="col-md-3">
                        <label>Modo de Leitura</label>
                        <select id="modoLeitura" class="form-select form-select-lg">
                            <option value="usb">Leitor USB</option>
                            <option value="camera">Câmera</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-success btn-lg w-100" onclick="iniciarModoTeste()">
                            <i class="bi bi-play-circle"></i> Iniciar
                        </button>
                    </div>
                </div>
                <div id="infoProduto" class="mt-3" style="display:none;">
                    <div class="alert alert-info mb-0">
                        <strong>Produto:</strong> <span id="infoNome"></span> | 
                        <strong>Modelo:</strong> <span id="infoModelo"></span> | 
                        <strong>Tipo:</strong> <span id="infoTipo"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- ÁREA DO SCANNER -->
        <div id="areaScanner" class="card mb-4" style="display:none;">
            <div class="card-body text-center">
                <h5><i class="bi bi-camera"></i> Câmera Ativada - Aponte para o código</h5>
                <div id="reader" style="max-width:600px;margin:15px auto;"></div>
                <button class="btn btn-secondary" onclick="pararScanner()">Fechar Câmera</button>
            </div>
        </div>

        <!-- TABELA DE TESTES IGUAL SEU PRINT -->
        <div id="areaTestes" style="display:none;">
            <div class="tabela-teste">
                <table class="table table-bordered mb-0">
                    <thead>
                        <tr>
                            <th style="width:60%">LEITOR COD BARRAS 1D 2D ELGIN BEMA EL250</th>
                            <th style="width:20%">NS</th>
                            <th style="width:20%">RESULTADO</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaTestesBody">
                        <!-- Linhas geradas dinamicamente -->
                    </tbody>
                </table>
            </div>
            <div class="d-flex justify-content-between align-items-center mt-3">
                <div>
                    <button class="btn btn-primary" onclick="adicionarLinha()">
                        <i class="bi bi-plus-circle"></i> Nova Linha
                    </button>
                    <button class="btn btn-info" onclick="ativarCamera()">
                        <i class="bi bi-camera"></i> Ativar Câmera
                    </button>
                </div>
                <div>
                    <strong>DATA: </strong><span id="dataHoje"></span>
                    <button class="btn btn-success ms-3" onclick="exportarExcel()">
                        <i class="bi bi-file-earmark-excel"></i> Exportar Excel
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let html5QrcodeScanner;
        let linhaAtual = 0;
        let modoTesteAtivo = false;

        // Inicializa
        if (!localStorage.getItem('testes')) localStorage.setItem('testes', JSON.stringify([]));
        if (!localStorage.getItem('produtos')) localStorage.setItem('produtos', JSON.stringify([]));
        if (!localStorage.getItem('operadores')) localStorage.setItem('operadores', JSON.stringify([{id:'1',matricula:'ADMIN',nome:'Administrador',setor:'Administrativo',turno:'Administrativo',status:'Ativo'}]));

        document.addEventListener('DOMContentLoaded', function() {
            carregarProdutos();
            carregarOperadores();
            document.getElementById('dataHoje').innerText = new Date().toLocaleDateString('pt-BR');
            
            // Captura Enter do leitor USB
            document.addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && modoTesteAtivo) {
                    const inputFocado = document.activeElement;
                    if (inputFocado && inputFocado.classList.contains('input-ns')) {
                        validarLeitura(inputFocado);
                    }
                }
            });
        });

        function carregarProdutos() {
            const produtos = JSON.parse(localStorage.getItem('produtos')) || [];
            const select = document.getElementById('produtoSelecionado');
            select.innerHTML = '<option value="">Selecione...</option>' + 
                produtos.map(p => `<option value="${p.codigo}" data-nome="${p.nome}" data-modelo="${p.modelo}" data-tipo="${p.tipo}">${p.codigo} - ${p.nome}</option>`).join('');
        }

        function carregarOperadores() {
            const operadores = JSON.parse(localStorage.getItem('operadores')) || [];
            const select = document.getElementById('operadorSelecionado');
            const ativos = operadores.filter(o => o.status === 'Ativo');
            select.innerHTML = '<option value="">Selecione...</option>' + 
                ativos.map(o => `<option value="${o.nome}">${o.matricula} - ${o.nome}</option>`).join('');
        }

        function carregarProdutoInfo() {
            const select = document.getElementById('produtoSelecionado');
            const opt = select.options[select.selectedIndex];
            if (opt.value) {
                document.getElementById('infoProduto').style.display = 'block';
                document.getElementById('infoNome').innerText = opt.dataset.nome;
                document.getElementById('infoModelo').innerText = opt.dataset.modelo;
                document.getElementById('infoTipo').innerText = opt.dataset.tipo;
            }
        }

        function iniciarModoTeste() {
            const produto = document.getElementById('produtoSelecionado').value;
            const operador = document.getElementById('operadorSelecionado').value;
            
            if (!produto || !operador) {
                alert('Selecione Produto e Operador primeiro');
                return;
            }
            
            modoTesteAtivo = true;
            document.getElementById('areaTestes').style.display = 'block';
            adicionarLinha();
            
            const modo = document.getElementById('modoLeitura').value;
            if (modo === 'camera') ativarCamera();
        }

        function adicionarLinha() {
            linhaAtual++;
            const tbody = document.getElementById('tabelaTestesBody');
            const tr = document.createElement('tr');
            tr.id = `linha-${linhaAtual}`;
            tr.innerHTML = `
                <td><input type="text" class="form-control input-ns" placeholder="Bipe ou digite o código" onfocus="this.classList.add('scan-ativo')" onblur="this.classList.remove('scan-ativo')"></td>
                <td><strong class="resultado-ns">-</strong></td>
                <td>
                    <button class="btn btn-sm btn-ok me-1" onclick="marcarResultado(this, 'OK')"><i class="bi bi-check"></i> OK</button>
                    <button class="btn btn-sm btn-nok" onclick="marcarResultado(this, 'NOK')"><i class="bi bi-x"></i> NOK</button>
                </td>
            `;
            tbody.appendChild(tr);
            tr.querySelector('.input-ns').focus();
        }

        function validarLeitura(input) {
            const ns = input.value.trim();
            if (!ns) return;
            
            const tr = input.closest('tr');
            const resultadoNS = tr.querySelector('.resultado-ns');
            
            // Aqui você valida se o NS tá correto
            // Por enquanto marca OK automático
            resultadoNS.innerText = 'OK';
            tr.classList.add('linha-ok');
            
            salvarTeste(ns, 'OK');
            adicionarLinha();
        }

        function marcarResultado(btn, resultado) {
            const tr = btn.closest('tr');
            const input = tr.querySelector('.input-ns');
            const ns = input.value.trim();
            
            if (!ns) {
                alert('Digite ou bip o número de série primeiro');
                return;
            }
            
            tr.querySelector('.resultado-ns').innerText = resultado;
            tr.classList.remove('linha-ok', 'linha-nok');
            tr.classList.add(resultado === 'OK' ? 'linha-ok' : 'linha-nok');
            
            salvarTeste(ns, resultado);
            adicionarLinha();
        }

        function salvarTeste(ns, resultado) {
            const produto = document.getElementById('produtoSelecionado').value;
            const operador = document.getElementById('operadorSelecionado').value;
            const produtoSelect = document.getElementById('produtoSelecionado');
            const opt = produtoSelect.options[produtoSelect.selectedIndex];
            
            const teste = {
                id: Date.now().toString(),
                data: new Date().toISOString(),
                tipo: opt.dataset.tipo,
                produtoCodigo: produto,
                produtoNome: opt.dataset.nome,
                modelo: opt.dataset.modelo,
                serie: ns,
                operador: operador,
                resultado: resultado
            };
            
            let testes = JSON.parse(localStorage.getItem('testes'));
            testes.unshift(teste);
            localStorage.setItem('testes', JSON.stringify(testes));
        }

        function ativarCamera() {
            document.getElementById('areaScanner').style.display = 'block';
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
                fps: 10, 
                qrbox: {width: 250, height: 150},
                formatsToSupport: [ 
                    Html5QrcodeSupportedFormats.CODE_128,
                    Html5QrcodeSupportedFormats.CODE_39,
                    Html5QrcodeSupportedFormats.EAN_13,
                    Html5QrcodeSupportedFormats.QR_CODE
                ]
            });
            html5QrcodeScanner.render(onScanSuccess, () => {});
        }

        function onScanSuccess(decodedText) {
            const inputs = document.querySelectorAll('.input-ns');
            const inputVazio = Array.from(inputs).find(i => !i.value.trim());
            if (inputVazio) {
                inputVazio.value = decodedText;
                validarLeitura(inputVazio);
            }
        }

        function pararScanner() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.clear();
                document.getElementById('areaScanner').style.display = 'none';
            }
        }

        function exportarExcel() {
            alert('Função de exportar Excel será implementada. Por enquanto use Ctrl+P pra imprimir.');
        }
    </script>
</body>
</html>
